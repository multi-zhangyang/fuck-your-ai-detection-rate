name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Regression checks
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Run Python static checks
        run: python -m ruff check .

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Run regression suite
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/run_regressions.py --fail-fast --include-browser-e2e

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Build production frontend
        run: npm --prefix app run build

      - name: Validate POSIX launcher
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -x start_web.sh
          bash -n start_web.sh
          bash -n docker-entrypoint.sh
          bash start_web.sh --help > /dev/null

      - name: Validate Windows launchers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\start_web.ps1 -Help | Out-Null
          cmd.exe /d /c start_web.bat -Help

      - name: Run isolated platform smoke
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/platform_install_smoke.py

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI_IMAGE: fyadr-ci:${{ github.sha }}
      CI_CONTAINER: fyadr-ci-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build --pull --tag "$CI_IMAGE" .

      - name: Start isolated production container
        shell: bash
        run: |
          set -euo pipefail
          for suffix in origin finish config prompts; do
            docker volume create "${CI_CONTAINER}-${suffix}"
          done
          docker run --detach \
            --name "$CI_CONTAINER" \
            --publish 127.0.0.1:18765:8765 \
            --volume "${CI_CONTAINER}-origin:/app/origin" \
            --volume "${CI_CONTAINER}-finish:/app/finish" \
            --volume "${CI_CONTAINER}-config:/app/config" \
            --volume "${CI_CONTAINER}-prompts:/app/prompts" \
            "$CI_IMAGE"

      - name: Probe API, frontend, runtime user, and writable state
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          import time
          from urllib.parse import urljoin
          from urllib.request import ProxyHandler, Request, build_opener

          base_url = "http://127.0.0.1:18765/"
          opener = build_opener(ProxyHandler({}))
          deadline = time.monotonic() + 90
          last_error = None
          while time.monotonic() < deadline:
              try:
                  with opener.open(Request(urljoin(base_url, "/api/ping")), timeout=2) as response:
                      ping = json.loads(response.read(65536).decode("utf-8"))
                  if response.status == 200 and ping.get("ok") is True and ping.get("service") == "fyadr-web":
                      break
              except Exception as exc:
                  last_error = exc
              time.sleep(1)
          else:
              raise SystemExit(f"container did not become ready: {last_error}")

          with opener.open(Request(urljoin(base_url, "/api/auth/status")), timeout=5) as response:
              auth = json.loads(response.read(65536).decode("utf-8"))
              assert response.status == 200 and isinstance(auth, dict)
          with opener.open(Request(base_url), timeout=5) as response:
              html = response.read(524288).decode("utf-8", errors="replace")
              assert response.status == 200 and 'id="root"' in html
          assets = re.findall(r'(?:src|href)="(/assets/[^"]+)"', html)
          assert assets, "production HTML did not reference a built static asset"
          with opener.open(Request(urljoin(base_url, assets[0])), timeout=5) as response:
              assert response.status == 200 and len(response.read(1024)) > 0
          PY
          docker top "$CI_CONTAINER" -eo pid,user,comm | awk '
            $3 == "gunicorn" { found = 1; if ($2 == "root") bad = 1 }
            END { exit !(found && !bad) }
          '
          docker exec --user 10001:10001 "$CI_CONTAINER" sh -c '
            set -eu
            for path in /app/origin /app/finish /app/config /app/prompts; do
              test -w "$path"
            done
            touch /app/finish/.fyadr-ci-write-probe
            rm /app/finish/.fyadr-ci-write-probe
          '

      - name: Show container logs on failure
        if: failure()
        run: docker logs "$CI_CONTAINER"

      - name: Clean isolated container resources
        if: always()
        shell: bash
        run: |
          docker rm --force "$CI_CONTAINER" 2>/dev/null || true
          for suffix in origin finish config prompts; do
            docker volume rm "${CI_CONTAINER}-${suffix}" 2>/dev/null || true
          done
          docker image rm "$CI_IMAGE" 2>/dev/null || true
