# FYADR single-container deployment. Flask serves the production frontend and API.

services:
  fyadr:
    build:
      context: .
      dockerfile: Dockerfile
    image: fyadr:latest
    container_name: fyadr
    restart: unless-stopped
    # Tune these limits together with the configured rewrite concurrency and
    # the model provider's rate limits.
    cpus: "1.0"
    mem_limit: "2g"
    memswap_limit: "2g"
    pids_limit: 256
    # Bound stdout/stderr retention without affecting application artifacts.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      # Keep loopback-only. Remote access needs a separate authenticated gateway;
      # TLS or FYADR_ALLOWED_ORIGINS alone is not access control.
      - "127.0.0.1:8765:8765"
    environment:
      # --- network / server ---
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8765"
      WEB_STATIC_DIR: "/app/static"
      # In-flight run/cancel/SSE state is process-local; keep exactly one worker.
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "4"
      # --- CORS: only needed if the frontend is served from ANOTHER origin.
      #     With Flask-serving-dist (single origin) this can stay empty. ---
      FYADR_ALLOWED_ORIGINS: ""
      # --- request limits (match .env.example defaults) ---
      FYADR_MAX_REQUEST_BYTES: "67108864"   # 64 MiB
      FYADR_MAX_UPLOAD_BYTES: "41943040"    # 40 MiB
      # --- config (provider keys) live on a mounted volume, NOT in the image ---
      FYADR_APP_CONFIG_DIR: "/app/config"
      # --- optional: history DB backup dir override (defaults under /app/finish) ---
      # FYADR_HISTORY_BACKUP_DIR: "/app/finish/history_db_backups"
      # Provider settings for the Web UI are saved through the UI in
      # /app/config/config.json. The FYADR_*/OPENAI_* variables documented in
      # .env.example are CLI fallbacks and do not pre-seed the Web UI.
    volumes:
      # --- PERSISTENT STATE (must survive container recreation) ---
      - ./data/origin:/app/origin                 # uploaded source docs
      - ./data/finish:/app/finish                 # exports, task state, history DB
      - ./data/config:/app/config                 # config.json (provider keys)
      - ./data/prompts:/app/prompts               # prompt edits, workflows, custom prompts
      # Migration source for Compose releases that stored only custom prompts
      # in data/prompts-custom. The entrypoint imports eligible files once.
      - ./data/prompts-custom:/app/legacy-prompts-custom:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/api/ping').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: false   # mounted application state must remain writable
    # Entrypoint starts as root only to chown bind mounts, then execs Gunicorn as
    # non-root UID 10001. Setting `user:` here would prevent that initialization.
